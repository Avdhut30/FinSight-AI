services:
  - type: web
    name: finsight-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && ./scripts/start.sh
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://your-service.onrender.com
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
